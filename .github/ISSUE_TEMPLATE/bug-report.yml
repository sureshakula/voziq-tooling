name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Found a bug? Tell us what happened. Keep it simple — we'll ask for more details if we need them.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you do, and what went wrong?
      placeholder: "I tried to ... and instead of ... it ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce (if you know them)
      description: Optional but helpful. How can we trigger this?
      placeholder: |
        1. Run ...
        2. Then ...
        3. See error

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: What are you running on?
      placeholder: |
        - OS: Ubuntu 24.04
        - Python: 3.12
        - CLI: Claude Code / Codex
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output (if any)
      description: Paste any error messages or stack traces.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Screenshots, logs, context — whatever helps.
