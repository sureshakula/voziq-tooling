name: Feedback
description: Share feedback, thoughts, or suggestions
title: "[Feedback]: "
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear from you. Bug reports and feature requests have their own templates — this one is for everything else.

        **Note:** Issues are public. Don't include personal info you don't want shared. For private back-and-forth, use [Discussions](https://github.com/AIOSAI/AIPass/discussions) instead.

  - type: input
    id: name
    attributes:
      label: Name or handle
      description: What should we call you? Use a handle if you prefer.
      placeholder: "Your name or @handle"
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: What kind of feedback?
      options:
        - General feedback
        - Something I liked
        - Something that confused me
        - Suggestion
        - Question
    validations:
      required: true

  - type: textarea
    id: message
    attributes:
      label: Your feedback
      description: Tell us what's on your mind.
      placeholder: "I tried AIPass and..."
    validations:
      required: true
