name: Windows Setup Test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'setup.sh'
      - 'src/aipass/*/apps/handlers/__init__.py'
      - 'src/aipass/drone/cli.py'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'setup.sh'
      - 'src/aipass/*/apps/handlers/__init__.py'
      - 'src/aipass/drone/cli.py'
      - 'pyproject.toml'

jobs:
  windows-setup:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run setup.sh
        shell: bash
        run: bash setup.sh

      - name: Verify drone CLI
        shell: bash
        run: |
          source .venv/Scripts/activate
          export PYTHONUTF8=1
          drone --version
          drone systems
          drone @seedgo --help
